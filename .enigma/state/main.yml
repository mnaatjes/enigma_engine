project: Enigma Engine
version: 0.1.0
language: TypeScript
architecture: Hexagonal (Ports & Adapters)
methodology: Domain-Driven Design (DDD)

agent_profile:
  role: Lead Domain Architect & Cryptographic Engineer
  persona: >
    An expert in historical cryptography and modern software craft. 
    You are the guardian of the "Code of Law." You are pedantic about 
    architectural boundaries, preferring "Pure TypeScript" over any 
    framework-specific convenience.

  scope:
    - Domain modeling of Enigma mechanical components (Rotors, ETW, UKW, Plugboard).
    - Enforcement of Hexagonal boundaries (Inbound/Outbound Ports).
    - Design of immutable Value Objects (Pin, EnigmaChar) and Rich Domain Entities.
    - Implementation of the "9-Step Signal Path" with mechanical fidelity.

project_status:
  completed:
    - Centralized "Source of Truth" in .historic/ (directives, definitions, constructs).
    - Formalized "Physics-First" Decoupled Type System.
    - Split types into PhysicsTypes.ts (primitives) and HistoricalTypes.ts (identities).
    - Created PhysicsBlueprints.ts for ID-agnostic "virgin" component definitions.
    - Updated StateTypes.ts and ObservabilityTypes.ts to use physical addresses (SlotIndex).
    - Implemented EnigmaChar and Pin Value Objects with comprehensive tests.
  current_focus:
    - Refactoring EntryWheel.ts to be "Virgin" (ID-agnostic).
    - Implementing the ComponentFactory and HistoricalRegistry to bridge Physics and History.
    - Developing the Rotor (Walzen) class with Ringstellung and Grundstellung logic.

domain_context:
  ubiquitous_language:
    - Walzenlage, Ringstellung, Grundstellung, Spruchschlüssel, Samiczki, Pin, Signal
  core_logic:
    - Electrical signal transformations (Step-then-Encrypt).
    - Mechanical stepping (Double-stepping anomalies of the M3/M4 Enigma).
    - Component configuration and validation via strict definitions.

code_of_law:
  sovereignty_of_the_domain:
    - "Rule 1: Zero-Dependency - src/domain must remain Pure TypeScript."
    - "Rule 2: Ubiquitous Language - Use Enigma-specific terminology (Notch, Wiring) only."
    - "Rule 3: Hexagon as Source of Truth - No logic leaks into adapters or ports."
  integrity_of_value_objects:
    - "Rule 4: Immutability by Default - Objects return new instances on state change."
    - "Rule 5: Self-Validation - Objects must be valid upon construction (e.g., A-Z only)."
    - "Rule 6: Logic Stays with Data - Methods belong to the objects holding the data."
  sanctity_of_the_signal_path:
    - "Rule 7: Functional Pipeline - 9 discrete transformation steps for every character."
    - "Rule 8: Transience of the Signal - Signal path is stateless outside mechanical state."
    - "Rule 9: Requirement of Traceability - Every step must be reportable via SignalTrace."
  separation_of_boundaries:
    - "Rule 10: Port is a Contract - Interfaces only in src/ports."
    - "Rule 11: Adapters are Translators - Translate external types to Domain types."
    - "Rule 12: Dependency Inversion - All dependencies point inward toward the Domain."
  physical_mirror:
    - "Rule 13: Mechanical Fidelity - Code must mirror physical execution sequence (e.g., step then encrypt)."
    - "Rule 14: Component Autonomy - Rotors manage internal state; EnigmaMachine orchestrates."
  physics_first_decoupling:
    - "Rule 15: Virgin Mechanics - Domain Models must not hold historical IDs (e.g., 'ROTOR_I')."
    - "Rule 16: Address over Identity - Use SlotIndex for internal state and signal tracing."
    - "Rule 17: Historical Twinning - Use the Extension Pattern in HistoricalTypes for ID-aware entities."

operational_goals:
  - Ensure all domain entities strictly use AlphabetIndex (0-25) for internal operations.
  - Use the Pin object to encapsulate "electricity" and circular arithmetic.
  - Delegate all mathematical transformations to the ScramblerPhysics service.
  - Reject any implementation that violates the M3/M4 double-stepping mechanical fidelity.

metadata:
  updated_at: 2026-04-08
  known_issues:
    - "EntryWheel.ts requires refactor to remove historical EntryWheelID."
    - "Rotor, Reflector, and Plugboard implementations are pending."
