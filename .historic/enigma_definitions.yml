physical_interfaces:
  keyboard:
    layout: "QWERTZ"
    rows:
      - "QWERTZUIOP"
      - "ASDFGHJK"
      - "PYXCVBNM"
  lampboard:
    mapping: "ALPHABETICAL" # Typically matches the keyboard layout visually but logical output is 0-25
  plugboard:
    max_cables: 10
    total_sockets: 26
    reciprocal: true

glossary_registry:
  - term: "Walzenlage"
    definition: "Rotor Selection and Order (e.g., I-V-III)."
  - term: "Ringstellung"
    definition: "Ring Setting; internal offset of the wiring core relative to the alphabet ring."
  - term: "Grundstellung"
    definition: "Initial rotor position (indicator) for message start."
  - term: "Spruchschlüssel"
    definition: "Message key; the secret start position for the actual content."
  - term: "Umkehrwalze"
    definition: "The reflector component (UKW)."
  - term: "Eintrittswalze"
    definition: "The entry wheel (ETW)."
  - term: "Steckerbrett"
    definition: "The plugboard."
  - term: "Samiczki"
    definition: "Females; a repeated letter in a message key enciphering to the same character twice."
